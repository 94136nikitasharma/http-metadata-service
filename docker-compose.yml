services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - metadata-network

  mongodb:
    image: mongo:7.0
    container_name: metadata-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - metadata-network

volumes:
  mongo_data:
    driver: local

networks:
  metadata-network:
    driver: bridge
